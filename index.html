<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>User Registration Form</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 0;
        padding: 20px;
    }

    .container {
        width: 500px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    h2 {
        text-align: center;
        color: #333;
    }

    label {
        display: block;
        margin-top: 10px;
        font-weight: bold;
    }

    input, select {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        border: 1px solid #ccc;
        border-radius: 5px;
        box-sizing: border-box;
    }

    .inline-group {
        margin-top: 10px;
    }

    .inline-group label {
        display: inline;
        font-weight: normal;
        margin-right: 15px;
    }

    .buttons {
        margin-top: 20px;
        text-align: center;
    }

    button {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        margin: 5px;
    }

    .submit-btn {
        background-color: #28a745;
        color: white;
    }

    .reset-btn {
        background-color: #dc3545;
        color: white;
    }
</style>
</head>

<body>

<div class="container">
    <h2>User Registration Form</h2>

    <form action="#" method="post">

        <!-- Text Input -->
        <label for="name">Full Name</label>
        <input type="text" id="name" placeholder="Enter your full name" required>

        <!-- Password Input -->
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="Enter password" required>

        <!-- Email Input -->
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="Enter your email" required>

        <!-- Telephone Input -->
        <label for="phone">Phone Number</label>
        <input type="tel" id="phone" placeholder="Enter phone number" required>

        <!-- URL Input -->
        <label for="website">Website URL</label>
        <input type="url" id="website" placeholder="https://example.com" required>

        <!-- Date Input -->
        <label for="dob">Date of Birth</label>
        <input type="date" id="dob" required>

        <!-- Datetime-local Input -->
        <label for="meeting">Preferred Meeting Time</label>
        <input type="datetime-local" id="meeting" required>

        <!-- File Input -->
        <label for="resume">Upload Resume</label>
        <input type="file" id="resume" required>

        <!-- Radio Buttons -->
        <label>Gender</label>
        <div class="inline-group">
            <label><input type="radio" name="gender" required> Male</label>
            <label><input type="radio" name="gender"> Female</label>
            <label><input type="radio" name="gender"> Other</label>
        </div>

        <!-- Checkbox -->
        <label>Interests</label>
        <div class="inline-group">
            <label><input type="checkbox"> Coding</label>
            <label><input type="checkbox"> Sports</label>
            <label><input type="checkbox"> Music</label>
        </div>

        <!-- Range Input -->
        <label for="experience">Programming Experience (Years)</label>
        <input type="range" id="experience" min="0" max="10" value="5">

        <!-- Color Input -->
        <label for="color">Favorite Color</label>
        <input type="color" id="color" value="#0000ff">

        <!-- Buttons -->
        <div class="buttons">
            <button type="submit" class="submit-btn">Submit</button>
            <button type="reset" class="reset-btn">Reset</button>
        </div>

    </form>
</div>

</body>
</html>
